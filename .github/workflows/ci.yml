name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  api:
    name: API (lint · format · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: annales-app/api
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: annales-app/api/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Tests
        run: npm test

  web:
    name: Web (lint · format)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: annales-app/web
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: annales-app/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
