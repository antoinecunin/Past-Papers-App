networks:
  public:
  backend:

volumes:
  mongo_data:
  garage_meta:
  garage_data:
  meili_data:

services:
  reverse-proxy:
    image: nginx:alpine
    container_name: annales-nginx
    mem_limit: 128m
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - public
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3

  web:
    build:
      context: ./web
      dockerfile: ../docker/web/Dockerfile
    container_name: annales-web
    mem_limit: 128m
    networks:
      - public
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: ../docker/api/Dockerfile
    container_name: annales-api
    mem_limit: 512m
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=350
      - API_PORT=${API_PORT}
      - API_HOST=0.0.0.0
      - API_LOG_LEVEL=${API_LOG_LEVEL}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - MONGO_URI=${MONGO_URI}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION}
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_USE_SSL=${S3_USE_SSL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - FRONTEND_URL=${FRONTEND_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME}
      - EMAIL_FROM_ADDRESS=${EMAIL_FROM_ADDRESS}
      - INITIAL_ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD}
      - INITIAL_ADMIN_FIRSTNAME=${INITIAL_ADMIN_FIRSTNAME}
      - INITIAL_ADMIN_LASTNAME=${INITIAL_ADMIN_LASTNAME}
      - MEILI_HOST=${MEILI_HOST}
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
    volumes:
      - ./instance.config.json:/config/instance.config.json:ro
      - ./instance.config.example.json:/config/instance.config.example.json:ro
    networks:
      - backend
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${API_PORT:-3000}${API_HEALTH_PATH:-/api/health} >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

  mongo:
    image: mongo:7
    container_name: annales-mongo
    mem_limit: 1024m
    command: --wiredTigerCacheSizeGB 0.5
    volumes:
      - mongo_data:/data/db
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'quit(db.adminCommand({ping:1}).ok?0:1)'"]
      interval: 10s
      timeout: 5s
      retries: 10

  garage:
    image: dxflrs/garage:v2.2.0
    container_name: annales-garage
    mem_limit: 128m
    volumes:
      - ./docker/garage/garage.toml:/etc/garage.toml:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    expose:
      - "3900"
    networks:
      - backend
    restart: unless-stopped

  meili:
    image: getmeili/meilisearch:v1.17
    container_name: annales-meili
    mem_limit: 512m
    environment:
      - MEILI_ENV=production
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - MEILI_MAX_INDEXING_MEMORY=200Mb
    volumes:
      - meili_data:/meili_data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7700/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

