networks:
  public-dev:
  backend-dev:

volumes:
  mongo_data_dev:
  minio_data_dev:

services:
  reverse-proxy:
    image: nginx:alpine
    container_name: annales-nginx-dev
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT}:80"  # Port différent pour éviter les conflits
    volumes:
      - ./docker/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    networks:
      - public-dev
      - backend-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: ./web
      dockerfile: ../docker/web/Dockerfile.dev
    container_name: annales-web-dev
    volumes:
      - ./web:/app
      - /app/node_modules
    networks:
      - public-dev
    restart: unless-stopped
    ports:
      - "${VITE_PORT}:${VITE_PORT}"  # Expose Vite dev server
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${VITE_PORT}/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./api
      dockerfile: ../docker/api/Dockerfile.dev
    container_name: annales-api-dev
    environment:
      - NODE_ENV=development
      - API_PORT=${API_PORT}
      - API_HOST=0.0.0.0
      - API_LOG_LEVEL=${API_LOG_LEVEL}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - MONGO_URI=${MONGO_URI}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION}
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_USE_SSL=${S3_USE_SSL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - FRONTEND_URL=${FRONTEND_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME}
      - EMAIL_FROM_ADDRESS=${EMAIL_FROM_ADDRESS}
    volumes:
      - ./api:/app
      - /app/node_modules
      - ./instance.config.json:/config/instance.config.json:ro
      - ./instance.config.example.json:/config/instance.config.example.json:ro
    networks:
      - backend-dev
    ports:
      - "${API_EXTERNAL_PORT}:${API_PORT}"  # Expose API dev server
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${API_PORT:-3001}${API_HEALTH_PATH:-/api/health} >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 12
      start_period: 25s

  mongo:
    image: mongo:7
    container_name: annales-mongo-dev
    volumes:
      - mongo_data_dev:/data/db
    networks:
      - backend-dev
    ports:
      - "${MONGO_EXTERNAL_PORT}:${MONGO_PORT}"  # Port différent pour le dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'quit(db.adminCommand({ping:1}).ok?0:1)'"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: annales-minio-dev
    command: server /data --address ":${MINIO_PORT}" --console-address ":${MINIO_CONSOLE_PORT}"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY}
    volumes:
      - minio_data_dev:/data
    ports:
      - "${MINIO_EXTERNAL_PORT}:${MINIO_PORT}"  # Port différent pour le dev
      - "${MINIO_CONSOLE_EXTERNAL_PORT}:${MINIO_CONSOLE_PORT}"  # Console port différent pour le dev
    networks:
      - backend-dev
    restart: unless-stopped

  minio-setup:
    image: minio/mc:latest
    container_name: annales-minio-setup-dev
    depends_on:
      minio:
        condition: service_started
    entrypoint: ["/bin/sh", "/setup.sh"]
    volumes:
      - ./docker/minio/setup.sh:/setup.sh:ro
    environment:
      - S3_ENDPOINT=minio:${MINIO_PORT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
    networks:
      - backend-dev
    restart: "no"

  # Service utilitaire pour manipuler MinIO (usage: docker compose run --rm mc ls minio/annales)
  mc:
    image: minio/mc:latest
    profiles: [tools]
    networks: [backend-dev]
    entrypoint: ["/bin/sh", "-c", "mc alias set minio http://annales-minio-dev:9000 $$S3_ACCESS_KEY $$S3_SECRET_KEY && exec mc \"$$@\"", "--"]
    environment:
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}