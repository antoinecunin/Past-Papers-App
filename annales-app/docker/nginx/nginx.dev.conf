worker_processes  auto;

error_log  /dev/stderr warn;
pid        /var/run/nginx.pid;

events { worker_connections 1024; }

http {
  access_log /dev/stdout;

  # DNS du réseau Docker (re-résolution des noms de containers)
  resolver 127.0.0.11 ipv6=off valid=30s;

  # Taille max des uploads (PDF)
  client_max_body_size 50m;

  # IP réelle côté proxy
  map $http_x_forwarded_for $client_real_ip { default $remote_addr; }

  # Dev: tout autoriser (pas de doublon bruyant)
  geo $allow_ip { default 1; }

  # Upstreams avec mémoire partagée + re-résolution pour dev
  upstream web {
    zone web 64k;
    server annales-web-dev:5173 resolve;  # Port Vite dev server
  }
  upstream api {
    zone api 64k;
    server annales-api-dev:3001 resolve;  # Port API dev
  }

  server {
    listen 80;
    server_name _;

    if ($allow_ip = 0) { return 403; }

    location / {
      proxy_pass http://web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $client_real_ip;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      
      # Headers pour Vite HMR (Hot Module Replacement)
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_http_version 1.1;
    }

    # Conserver le chemin tel quel (/api/health -> /api/health)
    location /api/ {
      proxy_pass http://api;  # pas de / final, pas de :3001 (on référence l'upstream)
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $client_real_ip;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}